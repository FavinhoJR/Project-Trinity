name: 🧪 Trinity CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 🔧 Backend Tests
  backend-tests:
    name: 🔧 Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: trinity_test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: 📦 Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: 🗄️ Setup test database
      working-directory: ./backend
      run: |
        export DATABASE_URL=postgresql://postgres@localhost:5432/trinity_test
        export JWT_SECRET=test-secret
        node -e "
          import('pg').then(async ({Pool}) => {
            const pool = new Pool({connectionString: process.env.DATABASE_URL});
            const fs = await import('fs');
            const sql = fs.readFileSync('../db/init.sql', 'utf8');
            await pool.query(sql);
            console.log('✅ Test database initialized');
            await pool.end();
          });
        "

    - name: 🧪 Run backend tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres@localhost:5432/trinity_test
        JWT_SECRET: test-secret
        NODE_ENV: test
      run: npm test

    - name: 📊 Upload backend coverage
      uses: codecov/codecov-action@v3
      with:
        directory: ./backend/coverage

  # 🌐 Frontend Tests
  frontend-tests:
    name: 🌐 Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: trinity
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 🐳 Start backend with Docker Compose
      run: |
        docker compose up -d db
        sleep 10

    - name: 📦 Install and start backend
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres@localhost:5432/trinity
        JWT_SECRET: test-secret
      run: |
        npm ci
        npm start &
        sleep 5

    - name: 📦 Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: 🎭 Install Playwright
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: 🧪 Run Playwright tests
      working-directory: ./frontend
      run: npm run test:e2e

    - name: 📊 Upload Playwright report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

  # 🚀 Deploy (opcional)
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🚀 Deploy notification
      run: echo "🎉 Ready for deployment to production!"
