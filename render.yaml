# Configuracion completa para desplegar TRINITY en Render
# Este archivo permite desplegar el backend y frontend automaticamente

services:
  # Backend API
  - type: web
    name: trinity-backend
    runtime: node
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trinity-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000

  # Frontend (Static Site)
  - type: web
    name: trinity-frontend
    runtime: static
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # Actualizar esta URL despues de desplegar el backend
        value: https://trinity-backend.onrender.com

databases:
  - name: trinity-db
    databaseName: trinity_uc73
    user: trinity
    plan: free
    region: oregon
