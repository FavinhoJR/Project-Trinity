version: "3.9"
services:
  db:
    image: postgres:16
    container_name: trinity_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trinity
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    command: ["postgres", "-c", "log_statement=all"]

  backend:
    build: ./backend
    container_name: trinity_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres@db:5432/trinity
      - JWT_SECRET=trinity-jwt-secret-key-2024-development
      - PORT=4000

  adminer:
    image: adminer
    container_name: trinity_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  db_data:
