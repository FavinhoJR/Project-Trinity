services:
  db:
    image: postgres:16
    container_name: trinity_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trinity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trinity"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: trinity_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trinity
      JWT_SECRET: trinity-jwt-secret-key-2024-development
      PORT: 4000
      NODE_ENV: development
    ports:
      - "4000:4000"

  adminer:
    image: adminer
    container_name: trinity_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  db_data:
